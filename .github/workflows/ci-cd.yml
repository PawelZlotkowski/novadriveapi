name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/novadrive
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Backend — unit + integration tests
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: novadrive_test
          POSTGRES_USER: novadrive
          POSTGRES_PASSWORD: novadrive123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/NovaDrive.UnitTests/NovaDrive.UnitTests.csproj --no-build --configuration Release --logger "github;verbosity=normal"

      - name: Integration Tests
        run: dotnet test tests/NovaDrive.IntegrationTests/NovaDrive.IntegrationTests.csproj --no-build --configuration Release --logger "github;verbosity=normal"
        env:
          # Testcontainers manages its own containers; these are unused but documented
          TEST_POSTGRES_PORT: 5432
          TEST_MONGO_PORT: 27017

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images (only on push to main/master)
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API ──
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file:    ./src/NovaDrive.Api/Dockerfile
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Admin frontend ──
      - name: Build & Push Admin
        uses: docker/build-push-action@v5
        with:
          context: ./dotnet-handoff/client
          file:    ./dotnet-handoff/client/Dockerfile.admin
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-admin:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }}
          build-args: |
            VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_ADMIN_CLIENT_ID=${{ secrets.VITE_AUTH0_ADMIN_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }}
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Passenger frontend ──
      - name: Build & Push Passenger
        uses: docker/build-push-action@v5
        with:
          context: ./dotnet-handoff/client
          file:    ./dotnet-handoff/client/Dockerfile.passenger
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-passenger:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-passenger:${{ github.sha }}
          build-args: |
            VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_PASSENGER_CLIENT_ID=${{ secrets.VITE_AUTH0_PASSENGER_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }}
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Deploy (SSH into server and docker compose pull + up)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/novadrive
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
