name: Build and publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: howest-mct/exam-project-backend-pawelzlotkowski

jobs:
  build-api:
    name: Build nova-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push nova-api
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/NovaDrive.Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-api:${{ github.sha }}
          cache-from: type=gha,scope=nova-api
          cache-to: type=gha,scope=nova-api,mode=max

  build-simulator:
    name: Build nova-simulator
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push nova-simulator
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/NovaDrive.Simulator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-simulator:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-simulator:${{ github.sha }}
          cache-from: type=gha,scope=nova-simulator
          cache-to: type=gha,scope=nova-simulator,mode=max

  build-admin:
    name: Build nova-admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push nova-admin
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/client
          file: ./frontend/client/Dockerfile.admin
          push: true
          build-args: |
            VITE_API_BASE_URL=
            VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_ADMIN_CLIENT_ID=${{ secrets.VITE_AUTH0_ADMIN_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }}
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-admin:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-admin:${{ github.sha }}
          cache-from: type=gha,scope=nova-admin
          cache-to: type=gha,scope=nova-admin,mode=max

  build-passenger:
    name: Build nova-passenger
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push nova-passenger
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/client
          file: ./frontend/client/Dockerfile.passenger
          push: true
          build-args: |
            VITE_API_BASE_URL=
            VITE_AUTH0_DOMAIN=${{ secrets.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_PASSENGER_CLIENT_ID=${{ secrets.VITE_AUTH0_PASSENGER_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.VITE_AUTH0_AUDIENCE }}
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-passenger:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/nova-passenger:${{ github.sha }}
          cache-from: type=gha,scope=nova-passenger
          cache-to: type=gha,scope=nova-passenger,mode=max
