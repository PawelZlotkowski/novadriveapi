server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so the upstream is resolved at request time,
    # not at startup — prevents nginx from refusing to start when nova-api
    # isn't ready yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy all /api requests to the backend — avoids CORS entirely
    # NOTE: proxy_pass must NOT include a URI path when using a variable;
    # otherwise nginx ignores the request URI and sends only the hardcoded path.
    location /api/ {
        set $api http://nova-api:8080;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy GraphQL
    location /graphql {
        set $api http://nova-api:8080;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # SPA fallback — serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff    always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
